openapi: 3.1.0
info:
  title: wg0 brain API
  version: "1.0.0"
  summary: Control plane for wg0 — multi-tenant WireGuard private networking
  description: |
    wg0 is a multi-tenant WireGuard control plane. The brain exposes a
    REST API for:

    * multi-tenant account + network management (JWT-authenticated)
    * device-first managed connector inventory and per-membership control
    * node enrollment, heartbeat, and unenroll (token + per-device secret)
    * native-LAN mode, overlay networks, and BYO Exit upstream tunnels
    * relay assist on native and overlay networks via network `relay_mode`
    * four-state presence (Online / Observed / Offline / Unknown)
    * device protocol v2 — strict, versioned, capability-aware
    * a separate admin surface gated on `X-Admin-Key`

    See the companion documents for context:

    * [README](https://github.com/absginc/wg0/blob/main/README.md)
    * [DEVICE_PROTOCOL.md](https://github.com/absginc/wg0/blob/main/docs/DEVICE_PROTOCOL.md)
    * [BYO_EXIT.md](https://github.com/absginc/wg0/blob/main/docs/BYO_EXIT.md)
    * [TESTING_ROADMAP.md](https://github.com/absginc/wg0/blob/main/docs/TESTING_ROADMAP.md)
    * [ROADBLOCKS.md](https://github.com/absginc/wg0/blob/main/docs/ROADBLOCKS.md)

    ## Versioning

    * Everything under `/api/v1/...` is frozen. Additive changes only.
    * `/api/v2/devices/:id/state` is the strict, versioned device protocol
      surface. Callers must send `Wg0-Protocol-Version: 2`.
    * v2 can evolve additively within v2; a structural change that breaks
      v2 clients means v3.

    ## Authentication schemes

    | Scheme | Header / field | Used by |
    |---|---|---|
    | `bearerAuth` | `Authorization: Bearer <JWT>` | owner-authenticated endpoints (dashboard + automation) |
    | `deviceSecret` | `X-Device-Secret: <secret>` | per-device endpoints on the v1 surface (heartbeat, config, rotate-secret, claim, self-delete) |
    | `strictDeviceAuth` | `X-Device-Secret` + `Wg0-Protocol-Version: 2` | v2 endpoints — no grace fallback |
    | `adminKey` | `X-Admin-Key: <key>` | `/api/v1/admin/*` endpoints |
    | `enrollmentToken` | `token` field in request body | `/api/v1/enroll/register` only |

  contact:
    name: wg0
    url: https://wg0.io
  license:
    name: Proprietary
servers:
  - url: https://connect.wg0.io
    description: Production brain
  - url: http://localhost:8000
    description: Local dev brain

tags:
  - name: Auth
    description: Account registration and login
  - name: API Keys
    description: Personal access tokens for long-lived automation
  - name: Accounts
    description: Account context, memberships, and team management
  - name: Devices
    description: Managed device inventory, peerings, endpoint history, and memberships
  - name: Device Profiles
    description: Access profiles and self-service device controls
  - name: Networks
    description: Multi-tenant network management
  - name: Enrollment
    description: Enrollment tokens + node registration
  - name: Nodes
    description: Node lifecycle + heartbeat
  - name: Device Protocol v1
    description: Device-authenticated endpoints on the v1 surface
  - name: Device Protocol v2
    description: Strict, versioned, capability-aware device surface
  - name: BYO Exit
    description: Upstream WireGuard tunnels attached to host nodes
  - name: Traffic
    description: Traffic telemetry
  - name: Admin
    description: Platform-wide admin endpoints (X-Admin-Key)
  - name: Health
    description: Service health

security: []

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Health check
      description: Simple liveness probe. No auth required.
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: wg0-brain }

  /api/v1/auth/register:
    post:
      tags: [Auth]
      operationId: registerAccount
      summary: Create a new account
      description: |
        Creates a new multi-tenant account. Returns a JWT on success.
        The password is hashed server-side with Argon2id; the brain never
        persists plaintext.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountRegister"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "409":
          description: Email already in use
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: loginAccount
      summary: Exchange credentials for a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountLogin"
      responses:
        "200":
          description: Login succeeded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/accounts/me:
    get:
      tags: [Accounts]
      operationId: getAccountMe
      summary: Current account context, plan, usage, and billing state
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountMeResponse" }

  /api/v1/accounts/me/memberships:
    get:
      tags: [Accounts]
      operationId: listAccountMemberships
      summary: List every account membership for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MembershipSummary" }

  /api/v1/accounts/switch:
    post:
      tags: [Accounts]
      operationId: switchAccount
      summary: Switch active account context
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SwitchAccountRequest" }
      responses:
        "200":
          description: Fresh bearer token for the requested account context
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }

  /api/v1/auth/accept-invite:
    post:
      tags: [Auth]
      operationId: acceptInvite
      summary: Accept a pending account invitation
      description: |
        Public endpoint. The invitation token in the request body is the
        authentication mechanism for this route.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                name: { type: string }
                password: { type: string, format: password }
      responses:
        "200":
          description: Invitation accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "400":
          description: Invalid or expired invitation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/accounts/users:
    get:
      tags: [Accounts]
      operationId: listAccountUsers
      summary: List users and pending invitations on the current account
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  /api/v1/accounts/users/invite:
    post:
      tags: [Accounts]
      operationId: inviteAccountUser
      summary: Invite a user to the current account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                role: { type: string }
      responses:
        "200":
          description: Invitation created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/accounts/users/invite/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [Accounts]
      operationId: revokeAccountInvite
      summary: Revoke a pending account invitation
      security:
        - bearerAuth: []
      responses:
        "204": { description: Revoked }

  /api/v1/accounts/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Accounts]
      operationId: updateAccountUser
      summary: Change a member role on the current account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    delete:
      tags: [Accounts]
      operationId: removeAccountUser
      summary: Remove a user from the current account
      security:
        - bearerAuth: []
      responses:
        "204": { description: Removed }

  /api/v1/accounts/users/{id}/suspend:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Accounts]
      operationId: suspendAccountUser
      summary: Suspend a user on the current account
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Suspended
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/accounts/users/{id}/reactivate:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Accounts]
      operationId: reactivateAccountUser
      summary: Reactivate a suspended user on the current account
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reactivated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/accounts/users/{id}/scopes:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Accounts]
      operationId: listAccountUserScopes
      summary: List network scopes for a team manager
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
    post:
      tags: [Accounts]
      operationId: addAccountUserScope
      summary: Grant a team manager access to a network
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                network_id: { type: string, format: uuid }
      responses:
        "200":
          description: Scope added
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/accounts/users/{id}/scopes/{network_id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: network_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [Accounts]
      operationId: removeAccountUserScope
      summary: Remove a team manager network scope
      security:
        - bearerAuth: []
      responses:
        "204": { description: Scope removed }

  /api/v1/api-keys:
    get:
      tags: [API Keys]
      operationId: listApiKeys
      summary: List personal access tokens for the authenticated account
      description: |
        **JWT-only** — the `jwtAuth` security scheme enforces this.
        PAT bearers are explicitly rejected with 401 so a leaked PAT
        cannot enumerate sibling credentials.

        Returns every PAT owned by this account, revoked ones
        included. Plaintext and hash are never returned — only the
        8-char prefix, metadata, and usage timestamps. Sort order:
        live keys first (most recent first), then revoked keys.
      security:
        - jwtAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ApiKeyListEntry" }
        "401":
          description: Missing JWT or PAT used
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      tags: [API Keys]
      operationId: createApiKey
      summary: Mint a new personal access token
      description: |
        **JWT-only** — enforced by the `jwtAuth` security scheme. PAT
        bearers are rejected with 401. A leaked PAT must never be
        able to mint successor credentials; minting requires fresh
        proof that the caller is the human owner.

        Returns the plaintext API key ONCE in the response body. The
        brain only stores the Argon2id hash. Optional `expires_at`
        auto-retires the token at the given time — strongly
        recommended for scheduled automation.

        PATs in the current MVP have the same authority as the
        user's JWT for every non-PAT-management endpoint (scope
        enforcement is tracked as follow-up in
        `docs/ROADBLOCKS.md` §9). Within PAT management itself,
        however, PATs are powerless — the only thing that can mint,
        list, or revoke them is a JWT.
      security:
        - jwtAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateApiKeyRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateApiKeyResponse" }
        "401":
          description: Missing JWT or PAT used
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/api-keys/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [API Keys]
      operationId: revokeApiKey
      summary: Revoke a personal access token
      description: |
        **JWT-only** — a leaked PAT cannot revoke its siblings, which
        would turn credential leakage into an availability attack.

        Sets `revoked_at`. Idempotent — revoking a non-existent or
        already-revoked key returns 204 either way, preventing
        oracle-style enumeration.
      security:
        - jwtAuth: []
      responses:
        "204": { description: Revoked }
        "401":
          description: Missing JWT or PAT used
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/networks:
    get:
      tags: [Networks]
      operationId: listNetworks
      summary: List all networks owned by the authenticated account
      description: |
        Returns every network the account owns, each enriched with
        aggregate counts: `node_count`, `online_count`, `tx_bytes`,
        `rx_bytes`. `online_count` follows the four-state presence
        model (Online + Observed both counted as connected).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NetworkWithStats" }
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      tags: [Networks]
      operationId: createNetwork
      summary: Create a new network
      description: |
        Creates either an overlay network (default, private subnet like
        `10.64.x.x`) or a native-LAN network (clients appear as real
        members of the host's LAN). See `network_type`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NetworkCreate" }
      responses:
        "201":
          description: Network created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Network" }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/networks/{id}:
    parameters:
      - $ref: "#/components/parameters/NetworkId"
    patch:
      tags: [Networks]
      operationId: updateNetwork
      summary: Update mutable network settings
      description: |
        Updates additive network policy. Today the key mutable field is
        `relay_mode`, which controls relay assist for native and overlay
        networks:

        * `never`  — direct peer-to-peer only
        * `auto`   — use relay assist during degraded bootstrap / recovery,
          then probe back to direct
        * `always` — force managed peerings through the account relay
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NetworkUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Network" }
        "422":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Networks]
      operationId: deleteNetwork
      summary: Delete a network and all its nodes
      security:
        - bearerAuth: []
      responses:
        "204": { description: Deleted }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/networks/{id}/provision:
    parameters:
      - $ref: "#/components/parameters/NetworkId"
    post:
      tags: [Enrollment]
      operationId: provisionDevice
      summary: Server-side keygen + enrollment for the QR/mobile flow
      description: |
        The brain generates a WireGuard keypair server-side, enrolls a
        new node with the generated public key, and returns the full
        `wg0.conf` text with the `PrivateKey` line populated.

        The private key is transmitted ONCE in the response and never
        persisted. The dashboard renders the wg_config as a QR code so
        stock WireGuard mobile apps can scan it directly.

        Devices enrolled via this path get `device_kind = 'provisioned'`
        and a `device_secret` (for future agent upgrades). The device
        secret is NOT returned in the response since stock WireGuard
        has nowhere to store it.

        For the bring-your-own-key path, see `/api/v1/enroll/register`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProvisionRequest" }
      responses:
        "201":
          description: Device provisioned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProvisionResponse" }

  /api/v1/enroll/generate-token:
    post:
      tags: [Enrollment]
      operationId: generateEnrollmentToken
      summary: Mint an enrollment token for a network
      description: |
        Tokens are used by the shell connector's `enroll` subcommand and
        by any other agent that supplies its own WireGuard public key.
        Single-use by default; pass `is_reusable: true` for a long-lived
        MSP provisioning token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TokenRequest" }
      responses:
        "201":
          description: Token minted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollmentToken" }

  /api/v1/enroll/register:
    post:
      tags: [Enrollment]
      operationId: enrollNode
      summary: Register a node using an enrollment token
      description: |
        Bring-your-own-key enrollment. The caller supplies its own
        WireGuard `public_key`; the brain never sees the private key.
        Returns overlay IP, peer list, full wg_config template with
        the `PrivateKey` placeholder, and a `device_secret` for
        subsequent device-authenticated calls.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EnrollRequest" }
      responses:
        "201":
          description: Enrolled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollResponse" }
        "400":
          description: Invalid token or payload
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/devices:
    get:
      tags: [Devices]
      operationId: listDevices
      summary: List managed devices
      description: |
        Returns one row per managed installation. A device owns one or
        more network memberships (node rows). This is the preferred
        inventory surface for the dashboard's Devices page.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DeviceSummaryResponse" }

  /api/v1/devices/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Device UUID
    get:
      tags: [Devices]
      operationId: getDevice
      summary: Get a managed device
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceSummaryResponse" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    patch:
      tags: [Devices]
      operationId: updateDevice
      summary: Update device metadata
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateDeviceRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceSummaryResponse" }

  /api/v1/devices/{id}/endpoint-history:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Device UUID
    get:
      tags: [Devices]
      operationId: getDeviceEndpointHistory
      summary: Device-scoped endpoint history
      description: |
        Aggregated endpoint timeline for all memberships attached to
        this managed device. Powers the Device detail endpoint-history tab.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceEndpointHistoryResponse" }

  /api/v1/devices/{id}/peerings:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Device UUID
    get:
      tags: [Devices]
      operationId: getDevicePeerings
      summary: Device-scoped mesh and relay peerings
      description: |
        Returns the per-membership peering view used by the managed
        Device page: direct/relayed/probing state, last handshake,
        observed endpoint, flow counters, and any dedicated relay helpers.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DevicePeeringsResponse" }

  /api/v1/devices/{id}/memberships:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Device UUID
    post:
      tags: [Devices]
      operationId: createMembershipRequest
      summary: Attach an existing device to another network
      description: |
        Creates a pending membership request for a managed device. The
        request is fulfilled by an upgraded client via the installation-scoped
        v2 path once it has generated a fresh WireGuard keypair locally.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMembershipRequestBody" }
      responses:
        "200":
          description: Device summary with the new pending request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceSummaryResponse" }
        "422":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/devices/{id}/memberships/{node_id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Device UUID
      - name: node_id
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Membership node UUID
    patch:
      tags: [Devices]
      operationId: updateMembership
      summary: Update a device membership
      description: |
        Updates membership-scoped settings such as node name, role,
        advertised routes, host failover metadata, and native VPN
        route-all behavior.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMembershipRequestBody" }
      responses:
        "200":
          description: Device summary with refreshed membership state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceSummaryResponse" }
    delete:
      tags: [Devices]
      operationId: deleteMembership
      summary: Remove a device from a network
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Device summary after membership deletion
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceSummaryResponse" }

  /api/v1/accounts/device-profiles:
    get:
      tags: [Device Profiles]
      operationId: listDeviceProfiles
      summary: List access profiles on the current account
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DeviceProfileResponse" }
    post:
      tags: [Device Profiles]
      operationId: createDeviceProfile
      summary: Create an access profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProfileRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceProfileResponse" }

  /api/v1/accounts/device-profiles/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Device Profiles]
      operationId: updateDeviceProfile
      summary: Update an access profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProfileRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceProfileResponse" }
    delete:
      tags: [Device Profiles]
      operationId: deleteDeviceProfile
      summary: Delete an access profile
      security:
        - bearerAuth: []
      responses:
        "204": { description: Deleted }

  /api/v1/accounts/device-profiles/{id}/users:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Device Profiles]
      operationId: listDeviceProfileUsers
      summary: List users assigned to an access profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
    post:
      tags: [Device Profiles]
      operationId: addDeviceProfileUser
      summary: Assign a user to an access profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string, format: uuid }
      responses:
        "200":
          description: Assigned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/accounts/device-profiles/{id}/users/{user_id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: user_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [Device Profiles]
      operationId: removeDeviceProfileUser
      summary: Remove a user from an access profile
      security:
        - bearerAuth: []
      responses:
        "204": { description: Removed }

  /api/v1/my-access:
    get:
      tags: [Device Profiles]
      operationId: getMyAccess
      summary: Self-service access view for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MyAccessResponse" }

  /api/v1/my-access/{id}/enroll-token:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Device Profiles]
      operationId: createMyAccessEnrollToken
      summary: Mint a self-service enrollment token for a profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token minted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollmentToken" }

  /api/v1/my-access/{id}/provision:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Device Profiles]
      operationId: createMyAccessProvisionedPeer
      summary: Provision a self-service QR/manual peer under a profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProvisionRequest" }
      responses:
        "200":
          description: Provisioned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProvisionResponse" }

  /api/v1/my-access/nodes/{id}:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    patch:
      tags: [Device Profiles]
      operationId: patchMyAccessNode
      summary: Self-service action on a member-owned device
      description: |
        Used by the member self-service UI for rename, delete, and
        VPN-through-host toggle actions gated by the assigned profile.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SelfServiceNodeAction" }
      responses:
        "200":
          description: Updated self-service view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MyAccessResponse" }

  /api/v1/nodes:
    get:
      tags: [Nodes]
      operationId: listNodes
      summary: List nodes owned by the authenticated account
      description: |
        Returns every node across every network the account owns, each
        enriched with derived fields: `presence` (four-state),
        `observed_endpoint` (from discover), `last_activity` (max of
        heartbeat + observations), `on_host_lan` (physical LAN adjacency
        for native-LAN clients).
      security:
        - bearerAuth: []
      parameters:
        - name: network_id
          in: query
          schema: { type: string, format: uuid }
          description: Optional filter to a single network
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NodeWithStatus" }

  /api/v1/nodes/{id}:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    patch:
      tags: [Nodes]
      operationId: updateNode
      summary: Update node settings
      description: |
        Updates mutable node fields. `route_all_traffic` is only valid on
        client nodes in native-LAN networks and will be rejected otherwise.
        `current_upstream_exit_id` / `clear_upstream_exit` are only valid
        on host nodes in native-LAN networks. Any field that affects the
        rendered wg_config bumps `config_version` so managed connectors
        fetch fresh config on their next heartbeat.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NodeUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Node" }
        "422":
          description: Validation error (guardrail hit)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Nodes]
      operationId: deleteNode
      summary: Delete a node (owner-authenticated)
      security:
        - bearerAuth: []
      responses:
        "204": { description: Deleted }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/nodes/{id}/assign:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    patch:
      tags: [Device Profiles]
      operationId: assignNodeOwner
      summary: Assign or transfer node ownership
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                owner_user_id: { type: string, format: uuid, nullable: true }
                device_profile_id: { type: string, format: uuid, nullable: true }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/nodes/{id}/claim:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    post:
      tags: [Device Protocol v1]
      operationId: claimNode
      summary: Claim a managed node for the current user
      security:
        - deviceSecret: []
      responses:
        "200":
          description: Claimed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/nodes/{id}/endpoint-history:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    get:
      tags: [Nodes]
      operationId: getNodeEndpointHistory
      summary: Node-scoped endpoint history
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NodeEndpointHistoryResponse" }

  /api/v1/nodes/{id}/heartbeat:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    post:
      tags: [Device Protocol v1]
      operationId: postHeartbeat
      summary: Managed connector heartbeat
      description: |
        Called by the managed connector every 30 seconds. Reports
        telemetry, peer observations, and route-all state. Response
        carries the fresh peer map, optional upstream_exit block,
        and `config_version` for drift detection.

        Authentication: if the node has a `device_secret_hash`,
        `X-Device-Secret` is required. Pre-v2 rows (NULL hash) use
        the grace path — header is accepted but not required.
      security:
        - deviceSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HeartbeatRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HeartbeatResponse" }
        "401":
          description: Invalid X-Device-Secret
        "404":
          description: Node not found

  /api/v1/nodes/{id}/self:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    delete:
      tags: [Device Protocol v1]
      operationId: selfUnenroll
      summary: Connector self-unenroll
      description: |
        Called by the connector's `unenroll` subcommand. Removes the
        node row and unregisters the peer from discover.
      security:
        - deviceSecret: []
      responses:
        "204": { description: Unenrolled }
        "401":
          description: Invalid X-Device-Secret
        "404":
          description: Node not found

  /api/v1/nodes/{id}/config:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    get:
      tags: [Device Protocol v1]
      operationId: getDeviceConfig
      summary: Fetch the current rendered wg_config for this device
      description: |
        Returns a freshly-rendered `wg_config` text with the `PrivateKey`
        placeholder preserved. The connector calls this when the heartbeat
        response advertises a `config_version` greater than the local
        stored value — it then substitutes its private key, rewrites
        `/etc/wireguard/wg0.conf`, and runs `wg syncconf` to converge
        the live interface without teardown.
      security:
        - deviceSecret: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceConfigResponse" }

  /api/v1/nodes/{id}/rotate-secret:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    post:
      tags: [Device Protocol v1]
      operationId: rotateDeviceSecret
      summary: Rotate the per-device secret
      description: |
        Generates a fresh secret, updates the stored Argon2id hash, and
        returns the new plaintext ONCE. Requires the CURRENT secret via
        `X-Device-Secret` — this is how post-incident rotation and
        legacy-to-strict migration both happen.
      security:
        - deviceSecret: []
      responses:
        "200":
          description: Rotated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RotateSecretResponse" }

  /api/v2/devices/{id}/state:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    post:
      tags: [Device Protocol v2]
      operationId: postDeviceState
      summary: Report current state + receive desired state (v2)
      description: |
        The v2 replacement for `/api/v1/nodes/:id/heartbeat`. Strict
        `X-Device-Secret` + `Wg0-Protocol-Version: 2` required. Body
        includes explicit `capabilities: [...]` the brain uses to
        capability-gate the desired-state response.
      security:
        - strictDeviceAuth: []
      parameters:
        - $ref: "#/components/parameters/ProtocolVersion"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/V2StateReport" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/V2StateResponse" }
        "401":
          description: Missing or invalid X-Device-Secret
        "422":
          description: Missing or wrong Wg0-Protocol-Version
    get:
      tags: [Device Protocol v2]
      operationId: getDeviceState
      summary: Fetch desired state only (v2)
      description: |
        Drift-refresh pull without reporting telemetry. Same auth rules
        as POST.
      security:
        - strictDeviceAuth: []
      parameters:
        - $ref: "#/components/parameters/ProtocolVersion"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/V2StateResponse" }

  /api/v2/devices/{id}/settings:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    patch:
      tags: [Device Protocol v2]
      operationId: patchDeviceSettings
      summary: Patch device-side settings (strict v2)
      description: |
        Strict device-authenticated toggle surface used by upgraded
        managed clients. Today this controls the device-side
        `route_all_traffic` / VPN-through-host setting and returns the
        refreshed desired-state document.
      security:
        - strictDeviceAuth: []
      parameters:
        - $ref: "#/components/parameters/ProtocolVersion"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/V2SettingsPatch" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/V2StateResponse" }

  /api/v2/installations/{id}/state:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Device UUID
    get:
      tags: [Devices]
      operationId: getInstallationState
      summary: Installation-scoped managed device state
      description: |
        Strict installation-authenticated inventory path for upgraded
        managed connectors. Returns device identity, existing memberships,
        and pending membership requests that can be fulfilled locally.
      security:
        - strictDeviceAuth: []
      parameters:
        - $ref: "#/components/parameters/ProtocolVersion"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstallationStateResponse" }

  /api/v2/installations/{id}/memberships/{request_id}/fulfill:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Device UUID
      - name: request_id
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Pending membership request UUID
    post:
      tags: [Devices]
      operationId: fulfillMembershipRequest
      summary: Fulfill a pending device membership request
      description: |
        Upgraded clients call this after generating a new local keypair
        for an additional network membership. Returns the new node identity,
        rendered wg_config, and initial peer set.
      security:
        - strictDeviceAuth: []
      parameters:
        - $ref: "#/components/parameters/ProtocolVersion"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FulfillMembershipRequestBody" }
      responses:
        "200":
          description: Membership fulfilled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FulfillMembershipResponse" }

  /api/v1/nodes/{id}/upstream-exits:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    get:
      tags: [BYO Exit]
      operationId: listUpstreamExits
      summary: List upstream WireGuard tunnels for a host
      description: |
        The `wg_config` field is intentionally excluded from list
        responses — it contains a private key and only the host itself
        (via its heartbeat) should ever see it.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UpstreamExitSummary" }
    post:
      tags: [BYO Exit]
      operationId: createUpstreamExit
      summary: Upload an upstream WireGuard config
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUpstreamExitRequest" }
      responses:
        "201":
          description: Upstream created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpstreamExitSummary" }

