        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NodeTraffic" }

  /api/v1/networks/{id}/traffic:
    parameters:
      - $ref: "#/components/parameters/NetworkId"
    get:
      tags: [Traffic]
      operationId: getNetworkTraffic
      summary: Aggregated time-series traffic for a network
      security:
        - bearerAuth: []
      parameters:
        - name: hours
          in: query
          schema: { type: integer, default: 24 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NodeTraffic" }

  /api/v1/billing/status:
    get:
      tags: [Accounts]
      operationId: getBillingStatus
      summary: Public billing readiness probe
      responses:
        "200":
          description: OK
