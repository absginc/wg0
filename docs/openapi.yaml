    delete:
      tags: [Admin]
      operationId: adminDeleteAccount
      summary: Delete an account
      security:
        - adminKey: []
      responses:
        "204": { description: Deleted }

  /api/v1/admin/nodes:
    get:
      tags: [Admin]
      operationId: adminListNodes
      summary: All enrolled nodes across all accounts
      description: |
        Returns per-node presence, `observed_endpoint`, `last_activity`,
        `device_kind`, `route_all_traffic`, `route_all_active`,
        `on_host_lan` — the full admin-dashboard row.
      security:
        - adminKey: []
      responses:
        "200":
          description: OK

  /api/v1/admin/networks:
    get:
      tags: [Admin]
      operationId: adminListNetworks
      summary: All networks with per-network counts
      security:
        - adminKey: []
      responses:
        "200":
          description: OK

  /api/v1/admin/traffic:
    get:
      tags: [Admin]
      operationId: adminTraffic
      summary: Per-account / per-network traffic totals
      security:
        - adminKey: []
      responses:
        "200":
          description: OK

components:
  parameters:
    NetworkId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Network UUID
    NodeId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Node UUID
    ProtocolVersion:
      name: Wg0-Protocol-Version
      in: header
      required: true
      schema: { type: string, enum: ["2"] }
      description: Must be exactly "2" for v2 endpoints

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT or wg0_pat
      description: |
        Either an owner JWT from `/api/v1/auth/login` or a personal
        access token (`wg0_pat_<43 chars>`) from
        `POST /api/v1/api-keys`. Both go in the
        `Authorization: Bearer <token>` header. The brain routes
        `wg0_pat_*` prefixed values to the PAT lookup path and
        everything else to JWT decoding. PATs have the same authority
        as the user's JWT for the MVP — scope enforcement is tracked
        as follow-up in ROADBLOCKS.md §9.

        **Exception:** PAT management endpoints under `/api/v1/api-keys`
        use the separate `jwtAuth` scheme which rejects PATs. This
        prevents a leaked PAT from minting successor credentials or
        revoking sibling credentials.
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Strict JWT-only variant. Used by endpoints where PATs are
        explicitly rejected: `POST /api/v1/api-keys`,
        `GET /api/v1/api-keys`, `DELETE /api/v1/api-keys/:id`. Obtain
        via `/api/v1/auth/login`. A PAT-prefixed bearer on these
        endpoints returns 401 with a clear error message.
    deviceSecret:
      type: apiKey
      in: header
      name: X-Device-Secret
      description: |
        Per-device secret returned once at enrollment. Used for all
        device-authenticated endpoints on the v1 surface. Pre-v2 rows
        (NULL `device_secret_hash`) use a grace path that accepts
        the request without the header.
    strictDeviceAuth:
      type: apiKey
      in: header
      name: X-Device-Secret
      description: |
        Strict variant used by v2 endpoints. Requires a matching
        stored hash — no grace fallback. v2 endpoints also require
        `Wg0-Protocol-Version: 2` as a separate header; see the
        `ProtocolVersion` parameter.
    adminKey:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: |
        Shared-secret key for the `/api/v1/admin/*` surface. Set via
        `ADMIN_API_KEY` env var on the brain; restrict admin access
        at the firewall / reverse-proxy level as well.

  schemas:
    Error:
      type: object
      properties:
        detail:
          type: string
          example: Invalid credentials
      required: [detail]

    AccountRegister:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        company_name: { type: string, nullable: true }

    AccountLogin:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    TokenResponse:
      type: object
      required: [access_token, token_type]
      properties:
        access_token: { type: string }
        token_type: { type: string, example: bearer }

    MembershipSummary:
      type: object
      properties:
        account_id: { type: string, format: uuid }
        company_name: { type: string, nullable: true }
        role: { type: string }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    SwitchAccountRequest:
      type: object
      required: [account_id]
      properties:
        account_id: { type: string, format: uuid }

    Entitlements:
      type: object
      additionalProperties: true
      description: Effective plan entitlements for the current account.

    AccountUsage:
      type: object
      properties:
        users: { type: integer, format: int64 }
        devices: { type: integer, format: int64 }
        networks: { type: integer, format: int64 }
        native_networks: { type: integer, format: int64 }
        host_nodes: { type: integer, format: int64 }
        pats: { type: integer, format: int64 }

    BillingState:
      type: object
      properties:
        configured: { type: boolean }
        stripe_customer_present: { type: boolean }
        subscription_status: { type: string, nullable: true }
        plan_updated_at: { type: string, format: date-time, nullable: true }
        state:
          type: string
          enum: [free, paid_healthy, payment_failed, canceled, enterprise, not_configured]

    AccountMeResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        user_email: { type: string, format: email }
        user_role: { type: string }
        user_id: { type: string, format: uuid }
        plan_code: { type: string }
        plan_display_name: { type: string }
        nominal_plan_code: { type: string }
        nominal_plan_display_name: { type: string }
        entitlements: { $ref: "#/components/schemas/Entitlements" }
        usage: { $ref: "#/components/schemas/AccountUsage" }
        billing: { $ref: "#/components/schemas/BillingState" }
        account_state: { type: string }
        grace_ends_at: { type: string, format: date-time, nullable: true }

    CreateApiKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Human-readable label (e.g. "ci-bot", "monitoring-cron")
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional auto-retirement time. None = never expires.

    CreateApiKeyResponse:
      type: object
      required: [id, name, key_prefix, created_at, api_key]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key_prefix:
          type: string
          description: First 8 chars of the random section, for display/audit
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time, nullable: true }
        api_key:
          type: string
          description: |
            Plaintext token, format `wg0_pat_<43 urlsafe-b64 chars>`.
            Returned ONCE and never again — the brain stores only the
            Argon2id hash. Capture this at mint time; if you lose it,
            you must revoke and mint a new one.
          example: wg0_pat_kx7aBCd9fGhIjKlMnOpQrStUvWxYz0123456789-_Abc

    ApiKeyListEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key_prefix: { type: string }
        scopes:
          type: array
          items: { type: string }
          description: For MVP always `["full"]`. Scope enforcement is future work.
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time, nullable: true }
        last_used_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }

    NetworkCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        network_type:
          type: string
          enum: [overlay, native]
          default: overlay
        overlay_subnet:
          type: string
          description: Overlay mode only. None → auto-assign from pool.
          nullable: true
        native_gateway_subnet: { type: string, nullable: true, example: "192.168.1.0/24" }
        native_host_tunnel_ip: { type: string, nullable: true, example: "192.168.1.2" }
        native_client_start: { type: string, nullable: true, example: "192.168.1.200" }
        native_client_end: { type: string, nullable: true, example: "192.168.1.220" }

    NetworkUpdate:
      type: object
      properties:
        relay_mode:
          type: string
          enum: [never, auto, always]
          description: Relay assist policy for native and overlay networks.

    Network:
      type: object
      properties:
        id: { type: string, format: uuid }
        account_id: { type: string, format: uuid }
        name: { type: string }
        overlay_subnet: { type: string }
        network_index: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
        network_type: { type: string, enum: [overlay, native] }
        relay_mode: { type: string, enum: [never, auto, always] }
        native_gateway_subnet: { type: string, nullable: true }
        native_host_tunnel_ip: { type: string, nullable: true }
        native_client_start: { type: string, nullable: true }
        native_client_end: { type: string, nullable: true }

    NetworkWithStats:
      allOf:
        - $ref: "#/components/schemas/Network"
        - type: object
          properties:
            node_count: { type: integer, format: int64 }
            online_count: { type: integer, format: int64 }
            tx_bytes: { type: integer, format: int64 }
            rx_bytes: { type: integer, format: int64 }

    Node:
      type: object
      properties:
        id: { type: string, format: uuid }
        network_id: { type: string, format: uuid }
        device_id: { type: string, format: uuid, nullable: true }
        node_name: { type: string }
        os_type: { type: string, nullable: true }
        role: { type: string, enum: [client, host] }
        overlay_ip: { type: string }
        public_key: { type: string }
        advertised_routes:
          type: array
          nullable: true
          items: { type: string }
        host_priority: { type: integer, nullable: true }
        host_lan_ip: { type: string, nullable: true }
        last_seen: { type: string, format: date-time, nullable: true }
        is_online: { type: boolean }
        last_endpoint: { type: string, nullable: true }
        tx_bytes: { type: integer, format: int64 }
        rx_bytes: { type: integer, format: int64 }
        route_all_traffic: { type: boolean }
        route_all_active: { type: boolean }
        device_kind: { type: string, enum: [managed, provisioned] }
        upstream_exit_last_handshake: { type: string, format: date-time, nullable: true }
        upstream_exit_interface_up: { type: boolean, nullable: true }
        upstream_exit_health_updated_at: { type: string, format: date-time, nullable: true }
        owner_user_id: { type: string, format: uuid, nullable: true }
        device_profile_id: { type: string, format: uuid, nullable: true }

    Presence:
      type: string
      enum: [online, observed, offline, unknown]
      description: |
        Four-state presence model:

        * `online` — managed device with fresh heartbeat OR confirmed
          by a managed peer's host observation report
        * `observed` — no authoritative signal, but the discover sidecar
          saw a fresh WireGuard handshake within 15 minutes
        * `offline` — managed device that used to heartbeat but hasn't
          been seen by any source recently
        * `unknown` — provisioned device with no telemetry yet

    NodeWithStatus:
      allOf:
        - $ref: "#/components/schemas/Node"
        - type: object
          properties:
            on_host_lan: { type: boolean }
            presence: { $ref: "#/components/schemas/Presence" }
            observed_endpoint: { type: string, nullable: true }
            last_activity: { type: string, format: date-time, nullable: true }
            upstream_exit_health: { $ref: "#/components/schemas/UpstreamExitHealth" }
            host_exit_health: { $ref: "#/components/schemas/UpstreamExitHealth" }
            mesh_mode:
              type: string
              nullable: true
              description: direct, relayed, or probing_recovery when assisted mesh is active

    NodeUpdate:
      type: object
      properties:
        node_name: { type: string }
        route_all_traffic: { type: boolean }
        current_upstream_exit_id: { type: string, format: uuid, nullable: true }
        clear_upstream_exit: { type: boolean }

    PeerConfig:
      type: object
      properties:
        public_key: { type: string }
        allowed_ips: { type: string, example: "10.0.0.2/32, 10.0.0.0/24" }
        endpoint: { type: string, nullable: true }
        is_online: { type: boolean }
        on_same_lan: { type: boolean }

    HeartbeatRequest:
      type: object
      properties:
        endpoint: { type: string, nullable: true }
        installation_id: { type: string, format: uuid, nullable: true }
        capabilities:
          type: array
          nullable: true
          items: { type: string }
        connector_version:
          type: string
          nullable: true
          description: |
            Short connector build identifier (e.g. `linux-shell-0.4.1`,
            `macos-native-0.2.4`, `windows-native-gg`,
            `android-native-alpha19`). Added 2026-04-22. Stored on
            `nodes.connector_version` and surfaced in the portal's
            "Update available" pill.
        tx_bytes: { type: integer, format: int64, nullable: true }
        rx_bytes: { type: integer, format: int64, nullable: true }
        host_lan_ip: { type: string, nullable: true }
        peers:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/ObservedPeer" }
        telemetry:
          nullable: true
          $ref: "#/components/schemas/V2DeviceTelemetry"
        route_all_active: { type: boolean, nullable: true }
        upstream_exit_health:
          nullable: true
          $ref: "#/components/schemas/UpstreamExitHealthReport"

    ObservedPeer:
      type: object
      description: One peer from `wg show <iface> dump` as the connector sees it
      properties:
        public_key: { type: string }
        last_handshake: { type: integer, format: int64, nullable: true, description: Unix seconds; null = never }
        rx_bytes: { type: integer, format: int64 }
        tx_bytes: { type: integer, format: int64 }

    HeartbeatResponse:
      type: object
      properties:
        overlay_ip: { type: string }
        peers:
          type: array
          items: { $ref: "#/components/schemas/PeerConfig" }
        probe_peers:
          type: array
          items: { $ref: "#/components/schemas/ProbePeerConfig" }
        upstream_exit:
          nullable: true
          $ref: "#/components/schemas/HostUpstreamExit"
        config_version: { type: integer, format: int64 }
        collect_device_telemetry: { type: boolean }

    ProbePeerConfig:
      type: object
      properties:
        public_key: { type: string }
        endpoint: { type: string, nullable: true }
        persistent_keepalive: { type: integer, format: int32, nullable: true }

    HostUpstreamExit:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        provider_type: { type: string }
        wg_config: { type: string }

    DeviceConfigResponse:
      type: object
      properties:
        wg_config: { type: string, description: "Full wg_config text with PrivateKey placeholder preserved" }
        probe_peers:
          type: array
          items: { $ref: "#/components/schemas/ProbePeerConfig" }
        config_version: { type: integer, format: int64 }
        device_kind: { type: string, enum: [managed, provisioned] }

    RotateSecretResponse:
      type: object
      properties:
        device_secret: { type: string, description: "New plaintext, returned once" }

    ProvisionRequest:
      type: object
      required: [node_name]
      properties:
        node_name: { type: string }
        os_type: { type: string, nullable: true }
        role:
          type: string
          enum: [client, host]
          default: client
        advertised_routes:
          type: array
          nullable: true
          items: { type: string }

    ProvisionResponse:
      type: object
      properties:
        node_id: { type: string, format: uuid }
        overlay_ip: { type: string }
        network_type: { type: string, enum: [overlay, native] }
        public_key: { type: string }
        wg_config: { type: string, description: "Full wg0.conf text with PrivateKey populated" }
        peers:
          type: array
          items: { $ref: "#/components/schemas/PeerConfig" }

    TokenRequest:
      type: object
      required: [network_id]
      properties:
        network_id: { type: string, format: uuid }
        is_reusable: { type: boolean, default: false }
        expires_at: { type: string, format: date-time, nullable: true }
        target_device_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Optional. When set, the minted token is bound to an
            existing `devices` row. On redemption
            (`POST /api/v1/enroll/register`), the brain takes an
            UPDATE path on the existing `nodes` row instead of
            allocating a new overlay IP: `public_key` and
            `device_secret` rotate, `config_version` bumps, but
            `node_id`, `overlay_ip`, and lifetime tx/rx counters are
            preserved. If the target device was deleted between mint
            and redeem, the brain falls through to the fresh-enroll
            INSERT path. Added 2026-04-23 for portal-driven
            re-enroll.

    EnrollmentToken:
      type: object
      properties:
        token_value: { type: string }
        network_id: { type: string, format: uuid }
        is_reusable: { type: boolean }
        expires_at: { type: string, format: date-time, nullable: true }

    EnrollRequest:
      type: object
      required: [token, node_name, public_key]
      properties:
        token: { type: string }
        installation_id: { type: string, format: uuid, nullable: true }
        node_name: { type: string }
        public_key: { type: string, description: "WireGuard public key, base64" }
        os_type: { type: string, nullable: true }
        role:
          type: string
          enum: [client, host]
          default: client
        advertised_routes:
          type: array
          nullable: true
          items: { type: string }
        endpoint: { type: string, nullable: true }

    EnrollResponse:
      type: object
      properties:
        node_id: { type: string, format: uuid }
        device_id: { type: string, format: uuid, nullable: true }
        installation_id: { type: string, format: uuid, nullable: true }
        overlay_ip: { type: string }
        network_type: { type: string, enum: [overlay, native] }
        device_secret:
          type: string
          description: Per-device secret. Returned ONCE; the brain only stores the Argon2id hash.
        wg_config: { type: string }
        peers:
          type: array
          items: { $ref: "#/components/schemas/PeerConfig" }

    UpstreamExitSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        host_node_id: { type: string, format: uuid }
        name: { type: string }
        provider_type: { type: string }
        created_at: { type: string, format: date-time }
        is_active: { type: boolean }

    CreateUpstreamExitRequest:
      type: object
      required: [name, wg_config]
      properties:
        name: { type: string }
        provider_type: { type: string, default: "custom-wg" }
        wg_config: { type: string, description: "Full wg0.conf text" }

    TrafficBucket:
      type: object
      properties:
        ts: { type: string, format: date-time }
        tx_bytes: { type: integer, format: int64 }
        rx_bytes: { type: integer, format: int64 }

    NodeTraffic:
      type: object
      properties:
        node_id: { type: string, format: uuid }
        total_tx_bytes: { type: integer, format: int64 }
        total_rx_bytes: { type: integer, format: int64 }
        buckets:
          type: array
          items: { $ref: "#/components/schemas/TrafficBucket" }

    # ── Device protocol v2 ──────────────────────────────────────────────
    V2StateReport:
      type: object
      required: [capabilities]
      properties:
        capabilities:
          type: array
          items: { type: string }
          description: |
            Stable capability identifiers this device can act on. The
            brain will not emit desired-state fields whose convergence
            requires a capability absent from this list.
          example:
            - split_tunnel_macos
            - byo_exit_macos
            - peer_observations
            - desired_state_convergence
        connector_version:
          type: string
          nullable: true
          description: |
            Short connector build identifier (same semantics as the v1
            heartbeat field). Added 2026-04-22.
        current_state: { $ref: "#/components/schemas/V2CurrentState" }

    V2CurrentState:
      type: object
      properties:
        endpoint_observed_local: { type: string, nullable: true }
        tx_bytes_lifetime: { type: integer, format: int64, nullable: true }
        rx_bytes_lifetime: { type: integer, format: int64, nullable: true }
        route_all_active: { type: boolean, nullable: true }
        host_lan_ip: { type: string, nullable: true }
        peers:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/ObservedPeer" }
        telemetry:
          nullable: true
          $ref: "#/components/schemas/V2DeviceTelemetry"
        last_convergence_errors:
          type: array
          nullable: true
          items: { type: string }

    V2DeviceTelemetry:
      type: object
      properties:
        battery:
          nullable: true
          $ref: "#/components/schemas/V2BatteryTelemetry"
        cpu:
          nullable: true
          $ref: "#/components/schemas/V2CpuTelemetry"
        memory:
          nullable: true
          $ref: "#/components/schemas/V2MemoryTelemetry"

    V2BatteryTelemetry:
      type: object
      properties:
        level_percent: { type: integer, nullable: true }
        charging: { type: boolean, nullable: true }
        status: { type: string, nullable: true }
        health: { type: string, nullable: true }
        temperature_c: { type: number, nullable: true }
        voltage_mv: { type: integer, nullable: true }

    V2CpuTelemetry:
      type: object
      properties:
        system_usage_percent: { type: number, nullable: true }
        app_usage_percent: { type: number, nullable: true }
        sample_window_ms: { type: integer, format: int64, nullable: true }

    V2MemoryTelemetry:
      type: object
      properties:
        total_bytes: { type: integer, format: int64, nullable: true }
        available_bytes: { type: integer, format: int64, nullable: true }
        app_pss_bytes: { type: integer, format: int64, nullable: true }
        low_memory: { type: boolean, nullable: true }

    V2StateResponse:
      type: object
      properties:
        node_id: { type: string, format: uuid }
        device_id: { type: string, format: uuid, nullable: true }
        installation_id: { type: string, format: uuid, nullable: true }
        overlay_ip: { type: string }
        network_type: { type: string, enum: [overlay, native] }
        device_kind: { type: string, enum: [managed, provisioned] }
        config_version: { type: integer, format: int64 }
        desired_state: { $ref: "#/components/schemas/V2DesiredState" }
        host_exit_health: { $ref: "#/components/schemas/UpstreamExitHealth" }
        collect_device_telemetry: { type: boolean }
        server_time: { type: string, format: date-time }
        required_capabilities:
          type: array
          items: { type: string }
          description: |
            Capabilities that would have been needed to act on fields
            that got capability-gated out of this response. Clients
            that see a non-empty list know they should surface an
            upgrade hint.

    V2DesiredState:
      type: object
      properties:
        peers:
          type: array
          items: { $ref: "#/components/schemas/PeerConfig" }
        probe_peers:
          type: array
          items: { $ref: "#/components/schemas/ProbePeerConfig" }
        upstream_exit: { $ref: "#/components/schemas/V2UpstreamExit" }
        route_all_traffic: { type: boolean }
        lan_publication: { $ref: "#/components/schemas/V2LanPublication" }

    V2SettingsPatch:
      type: object
      properties:
        route_all_traffic:
          type: boolean
          description: Toggle VPN-through-host / default-route behavior for this device.

    V2LanPublication:
      type: object
      properties:
        enabled: { type: boolean }
        native_gateway_subnet: { type: string }
        published_clients:
          type: array
          items: { $ref: "#/components/schemas/V2PublishedClient" }

    V2PublishedClient:
      type: object
      properties:
        node_id: { type: string, format: uuid }
        node_name: { type: string }
        overlay_ip: { type: string }
        presence: { $ref: "#/components/schemas/Presence" }
        device_kind: { type: string, enum: [managed, provisioned] }

    V2UpstreamExit:
      oneOf:
        - type: object
          required: [state]
          properties:
            state: { type: string, enum: [off] }
        - type: object
          required: [state, id, name, provider_type, wg_config]
          properties:
            state: { type: string, enum: [active] }
            id: { type: string, format: uuid }
            name: { type: string }
            provider_type: { type: string }
            wg_config: { type: string }

    UpstreamExitHealth:
      type: object
      properties:
        state:
          type: string
          enum: [unknown, healthy, degraded, down, never]
        last_handshake: { type: string, format: date-time, nullable: true }
        last_updated: { type: string, format: date-time, nullable: true }
        interface_up: { type: boolean, nullable: true }
        message: { type: string }

    UpstreamExitHealthReport:
      type: object
      properties:
        interface_up: { type: boolean }
        last_handshake:
          type: integer
          format: int64
          nullable: true
          description: Unix seconds of the most recent upstream-exit handshake.

    DeviceMembershipSummary:
      type: object
      properties:
        node_id: { type: string, format: uuid }
        network_id: { type: string, format: uuid }
        network_name: { type: string }
        network_type: { type: string, enum: [overlay, native] }
        relay_mode: { type: string, enum: [never, auto, always] }
        node_name: { type: string }
        os_type: { type: string, nullable: true }
        role: { type: string, enum: [client, host] }
        overlay_ip: { type: string }
        advertised_routes:
          type: array
          nullable: true
          items: { type: string }
        host_priority: { type: integer, nullable: true }
        host_lan_ip: { type: string, nullable: true }
        route_all_traffic: { type: boolean }
        route_all_active: { type: boolean }
        config_version: { type: integer, format: int64 }
        is_online: { type: boolean }
        last_seen: { type: string, format: date-time, nullable: true }
        native_host_role: { type: string, nullable: true }
        native_host_state: { type: string, nullable: true }
        owner_user_id: { type: string, format: uuid, nullable: true }
