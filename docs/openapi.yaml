      responses:
        "200":
          description: Remediation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: active }

  /api/v1/admin/stats:
    get:
      tags: [Admin]
      operationId: adminStats
      summary: Platform-wide summary counters
      security:
        - adminKey: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminStats" }

  /api/v1/admin/accounts:
    get:
      tags: [Admin]
      operationId: adminListAccounts
      summary: All accounts with network + node counts
      security:
        - adminKey: []
      responses:
        "200":
          description: OK

  /api/v1/admin/accounts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Admin]
      operationId: adminAccountDetail
      summary: Deep detail for one account
